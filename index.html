<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hafız Yuşa Çiloğlan</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#e5e7eb;
  overflow:hidden;

  background:#05060a;
  background-image:
    linear-gradient(rgba(59,130,246,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.08) 1px, transparent 1px);
  background-size:42px 42px;
}

/* glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top, rgba(59,130,246,0.22), transparent 60%);
  pointer-events:none;
}

/* INTRO (FAST) */
#intro{
  position:fixed;
  inset:0;
  background:#05060a;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
  animation:fadeOut 1s ease forwards;
  animation-delay:0.8s; /* 🔥 hızlı geçiş */
}

#intro h1{
  color:#93c5fd;
  text-shadow:0 0 20px #2563eb;
  letter-spacing:2px;
}

@keyframes fadeOut{
  to{opacity:0; visibility:hidden;}
}

/* HEADER */
header{
  text-align:center;
  padding:30px 20px 10px;
}

h1{
  margin:0;
  font-size:38px;
  color:#93c5fd;
  text-shadow:0 0 18px #2563eb;
}

.subtitle{
  opacity:0.7;
}

/* NAV */
.nav{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

.nav button{
  background:rgba(2,6,23,0.7);
  border:1px solid rgba(59,130,246,0.25);
  color:white;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  font-size:13px;
}

.nav button:hover{
  transform:scale(1.05);
  box-shadow:0 0 12px rgba(59,130,246,0.4);
}

.nav button.active{
  background:#1d4ed8;
}

/* FIXED CONTENT BOX (SPAWN POINT) */
.container{
  height:calc(100vh - 160px);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* SINGLE SPAWN CARD */
.card{
  width:90%;
  max-width:750px;
  background:rgba(2,6,23,0.75);
  border:1px solid rgba(59,130,246,0.2);
  border-radius:18px;
  padding:28px;

  opacity:0;
  transform:scale(0.95);
  transition:0.5s ease;
  position:absolute;
}

.card.show{
  opacity:1;
  transform:scale(1);
}

.title{
  color:#93c5fd;
  font-size:22px;
  margin-bottom:10px;
}

/* particles */
.p{
  position:fixed;
  width:4px;
  height:4px;
  background:#60a5fa;
  border-radius:50%;
  opacity:0.3;
  animation:up 10s linear infinite;
}

@keyframes up{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>HAFIZ YUŞA</h1>
</div>

<header>
  <h1>HAFIZ YUŞA ÇİLOĞLAN</h1>
  <div class="subtitle">Kur’an • İlim • Yolculuk</div>

  <div class="nav">
    <button class="active" onclick="go(0)">Hakkımda</button>
    <button onclick="go(1)">Hafızlık</button>
    <button onclick="go(2)">Ezan</button>
    <button onclick="go(3)">Umre</button>
    <button onclick="go(4)">İlim</button>
  </div>
</header>

<div class="container">

<!-- SINGLE SPAWN BOX -->
<div class="card show" id="box">

  <div class="title">Hakkımda</div>
  <p>
    Bir yol vardı… sessiz, sabırlı ve derin.  
    Ben o yolun içinde Kur’an’la büyüdüm.
  </p>

</div>

</div>

<script>

const box=document.getElementById("box");
const btns=document.querySelectorAll(".nav button");

/* ROMAN STYLE TEXTS */
const texts=[
{
title:"Hakkımda",
text:`Bir çocuk düşün… sessiz bir gecede Kur’an sesiyle büyüyen.  
Ben o sessizliğin içinden geldim.`
},

{
title:"Hafızlık",
text:`Ezber değildi bu…  
kendini yeniden inşa etmekti.`
},

{
title:"Ezan",
text:`Bir ses değil… göğe açılan bir kapıydı benim için.`
},

{
title:"Umre",
text:`Kâbe’yi gördüğüm an, dünya geride kaldı.  
Zaman sustu.`
},

{
title:"İlim",
text:`Kitaplar bana bilgi değil, yön verdi.  
Her sayfa bir iz bıraktı.`
}
];

/* SPAWN CHANGE */
function go(i){

  box.classList.remove("show");

  setTimeout(()=>{
    box.innerHTML=`
      <div class="title">${texts[i].title}</div>
      <p>${texts[i].text}</p>
    `;
    box.classList.add("show");
  },150);

  btns.forEach(b=>b.classList.remove("active"));
  btns[i].classList.add("active");
}

/* particles */
for(let i=0;i<30;i++){
  let p=document.createElement("div");
  p.className="p";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(p);
}

</script>

</body>
</html>

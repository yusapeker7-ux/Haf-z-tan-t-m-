<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hafız Yuşa Çiloğlan</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#e5e7eb;
  overflow-x:hidden;

  background:#05060a;
  background-image:
    linear-gradient(rgba(59,130,246,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.08) 1px, transparent 1px);
  background-size:42px 42px;
}

/* glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top, rgba(59,130,246,0.22), transparent 60%);
  pointer-events:none;
}

/* HEADER */
header{
  text-align:center;
  padding:35px 20px 10px;
}

h1{
  margin:0;
  font-size:36px;
  color:#93c5fd;
  text-shadow:0 0 18px #2563eb;
}

.subtitle{
  opacity:0.7;
  margin-top:5px;
}

/* NAV */
.nav{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-top:18px;
}

.nav button{
  background:rgba(2,6,23,0.7);
  border:1px solid rgba(59,130,246,0.25);
  color:white;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  font-size:13px;
}

.nav button:hover{
  transform:scale(1.05);
  box-shadow:0 0 12px rgba(59,130,246,0.4);
}

.nav button.active{
  background:#1d4ed8;
}

/* CONTENT BOX */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:calc(100vh - 160px);
}

.card{
  width:90%;
  max-width:800px;
  background:rgba(2,6,23,0.75);
  border:1px solid rgba(59,130,246,0.2);
  border-radius:18px;
  padding:28px;

  opacity:0;
  transform:translateY(20px);
  transition:0.5s ease;
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.title{
  color:#93c5fd;
  font-size:22px;
  margin-bottom:12px;
  text-shadow:0 0 10px rgba(37,99,235,0.4);
}

p{
  line-height:1.6;
  opacity:0.95;
}
</style>
</head>

<body>

<header>
  <h1>HAFIZ YUŞA ÇİLOĞLAN</h1>
  <div class="subtitle">Kur’an • İlim • Yolculuk</div>

  <div class="nav">
    <button class="active" onclick="go(0)">Hakkımda</button>
    <button onclick="go(1)">Yolculuğum</button>
    <button onclick="go(2)">İlim</button>
  </div>
</header>

<div class="container">
  <div class="card show" id="box">
    <div class="title">Hakkımda</div>
    <p>
      Ben Hafız Yuşa Çiloğlan. Küçük yaşlardan itibaren Kur’an ile iç içe büyüdüm.  
      Hafızlık süreci benim için sadece ezber değil, sabır ve disiplinin kendisiydi.  
      Zamanla kendimi hem dini ilimlerde hem de farklı alanlarda geliştirmeye çalıştım.
    </p>
  </div>
</div>

<script>

const box=document.getElementById("box");
const btns=document.querySelectorAll(".nav button");

const data=[
{
title:"Hakkımda",
text:`Ben Hafız Yuşa Çiloğlan. Küçük yaşlardan itibaren Kur’an ile iç içe büyüdüm.  
Hafızlık süreci benim için sadece ezber değil, sabır ve disiplinin kendisiydi.  
Zamanla kendimi hem dini ilimlerde hem de farklı alanlarda geliştirmeye çalıştım.`
},

{
title:"Yolculuğum",
text:`Hafızlık süreci boyunca tekrar, emek ve sabır hayatımın merkezindeydi.  
Ezan çalışmalarıyla birlikte sesin sadece bir ton değil, bir anlam taşıdığını öğrendim.  
Umre yolculuğum ise bakış açımı değiştiren en önemli anlardan biri oldu.`
},

{
title:"İlim",
text:`Kur’an bana sabrı öğretti.  
Riyazus-Salihin ahlakı öğretti.  
İslam tarihi ise bakış açımı genişletti.  
Bilgi benim için sadece öğrenmek değil, değişmek anlamına geliyor.`
}
];

function go(i){

  box.classList.remove("show");

  setTimeout(()=>{
    box.innerHTML=`
      <div class="title">${data[i].title}</div>
      <p>${data[i].text}</p>
    `;
    box.classList.add("show");
  },120);

  btns.forEach(b=>b.classList.remove("active"));
  btns[i].classList.add("active");
}

</script>

</body>
</html>
